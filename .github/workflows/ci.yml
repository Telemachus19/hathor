name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Contracts, formatting, migrations, and service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm contracts:check
      - run: pnpm format:check
      - run: pnpm verify:migrations
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:services

  test-compose:
    name: Isolated Compose fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.test.yml --profile fixtures config --quiet
      - run: docker compose -f docker-compose.test.yml --profile fixtures up --build --abort-on-container-exit --exit-code-from test-fixtures
      - if: always()
        run: docker compose -f docker-compose.test.yml --profile fixtures down --volumes --remove-orphans

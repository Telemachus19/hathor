name: hathor

x-postgres: &postgres-defaults
  image: postgres:16.4-alpine
  restart: unless-stopped
  networks:
    - backend
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 5s
    timeout: 5s
    retries: 10
    start_period: 5s

x-service: &service-defaults
  restart: unless-stopped
  networks:
    - backend
  init: true

services:
  auth-postgres:
    <<: *postgres-defaults
    environment:
      POSTGRES_USER: hathor_admin
      POSTGRES_PASSWORD: ${AUTH_DB_ADMIN_PASSWORD:?AUTH_DB_ADMIN_PASSWORD is required}
      POSTGRES_DB: auth
      POSTGRES_RUNTIME_USER: auth_app
      POSTGRES_RUNTIME_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-service-db.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro

  catalog-postgres:
    <<: *postgres-defaults
    environment:
      POSTGRES_USER: hathor_admin
      POSTGRES_PASSWORD: ${CATALOG_DB_ADMIN_PASSWORD:?CATALOG_DB_ADMIN_PASSWORD is required}
      POSTGRES_DB: catalog
      POSTGRES_RUNTIME_USER: catalog_app
      POSTGRES_RUNTIME_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-service-db.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro

  commerce-postgres:
    <<: *postgres-defaults
    environment:
      POSTGRES_USER: hathor_admin
      POSTGRES_PASSWORD: ${COMMERCE_DB_ADMIN_PASSWORD:?COMMERCE_DB_ADMIN_PASSWORD is required}
      POSTGRES_DB: commerce
      POSTGRES_RUNTIME_USER: commerce_app
      POSTGRES_RUNTIME_PASSWORD: ${COMMERCE_DB_PASSWORD:?COMMERCE_DB_PASSWORD is required}
    volumes:
      - commerce_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-service-db.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro

  library-postgres:
    <<: *postgres-defaults
    environment:
      POSTGRES_USER: hathor_admin
      POSTGRES_PASSWORD: ${LIBRARY_DB_ADMIN_PASSWORD:?LIBRARY_DB_ADMIN_PASSWORD is required}
      POSTGRES_DB: library
      POSTGRES_RUNTIME_USER: library_app
      POSTGRES_RUNTIME_PASSWORD: ${LIBRARY_DB_PASSWORD:?LIBRARY_DB_PASSWORD is required}
    volumes:
      - library_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-service-db.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro

  memcached:
    image: memcached:1.6.29-alpine
    restart: unless-stopped
    networks:
      - backend
    command: ["memcached", "--memory-limit=64", "--conn-limit=256"]
    healthcheck:
      test: ["CMD-SHELL", "printf 'version\\r\\n' | nc -w 1 127.0.0.1 11211 | grep -q VERSION"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    networks:
      - backend
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13.4-management-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 5001
      AUTH_DB_URL: postgresql://auth_app:${AUTH_DB_PASSWORD}@auth-postgres:5432/auth
      REDIS_URL: redis://redis:6379
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  catalog-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 5002
      CATALOG_DB_URL: postgresql://catalog_app:${CATALOG_DB_PASSWORD}@catalog-postgres:5432/catalog
      MEMCACHED_URL: memcached:11211
    depends_on:
      catalog-postgres:
        condition: service_healthy
      memcached:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5002/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  commerce-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/commerce-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 5003
      COMMERCE_DB_URL: postgresql://commerce_app:${COMMERCE_DB_PASSWORD}@commerce-postgres:5432/commerce
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      commerce-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5003/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  library-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/library-service/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 5004
      LIBRARY_DB_URL: postgresql://library_app:${LIBRARY_DB_PASSWORD}@library-postgres:5432/library
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      library-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5004/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - edge
      - backend
    environment:
      NODE_ENV: development
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      AUTH_SERVICE_URL: http://auth-service:5001
      CATALOG_SERVICE_URL: http://catalog-service:5002
      COMMERCE_SERVICE_URL: http://commerce-service:5003
      LIBRARY_SERVICE_URL: http://library-service:5004
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      commerce-service:
        condition: service_healthy
      library-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    networks:
      - edge
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  edge:
  backend:
    internal: true

volumes:
  auth_postgres_data:
  catalog_postgres_data:
  commerce_postgres_data:
  library_postgres_data:
  rabbitmq_data:

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  location = /health/live {
    default_type application/json;
    return 200 '{"success":true,"data":{"service":"web","status":"live"}}';
  }

  location = /health/ready {
    default_type application/json;
    return 200 '{"success":true,"data":{"service":"web","status":"ready"}}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
